<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>গল্পের জগৎ · Story Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Syne:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#09061a;--bg2:#0d0b21;--glass:rgba(255,255,255,0.04);--glass-b:rgba(255,255,255,0.09);
  --cyan:#00f5d4;--pink:#f72585;--gold:#ffd166;--blue:#74b9ff;--green:#39ff14;
  --violet:#b5179e;--text:#eeeeff;--muted:#7777aa;
  --r:18px;--fbn:'Hind Siliguri',sans-serif;--fen:'Syne',sans-serif;--fmono:'Space Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);font-family:var(--fbn);min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 5%,rgba(45,27,105,.6) 0%,transparent 60%),
    radial-gradient(ellipse 60% 45% at 80% 90%,rgba(26,26,62,.7) 0%,transparent 55%),
    radial-gradient(ellipse 50% 60% at 50% 50%,rgba(13,11,33,.85) 0%,transparent 70%);
}
/* Stars */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 35%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 48% 18%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 55%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 28%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 70%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 85%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 42% 90%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 58% 5%,rgba(255,255,255,.32) 0%,transparent 100%),
    radial-gradient(1px 1px at 3% 50%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 8%,rgba(255,255,255,.28) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 60%,rgba(255,255,255,.22) 0%,transparent 100%);
}
.wrapper{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 20px 80px}

/* ── HEADER ── */
.site-header{text-align:center;padding:60px 20px 44px}
.hdr-eyebrow{font-family:var(--fmono);font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--cyan);margin-bottom:14px;opacity:.8}
.hdr-title{font-family:var(--fen);font-size:clamp(2.2rem,5.5vw,4.4rem);font-weight:800;line-height:1.06;
  background:linear-gradient(135deg,#eeeeff 0%,var(--cyan) 35%,var(--violet) 70%,#eeeeff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.hdr-sub{font-family:var(--fbn);font-size:clamp(.85rem,1.8vw,1rem);color:var(--muted);font-weight:300;max-width:520px;margin:0 auto;line-height:1.8}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--glass-b),transparent);margin:0 0 44px}

/* ── PART SEPARATOR ── */
.part-sep{display:flex;align-items:center;gap:18px;margin:52px 0 36px}
.part-sep-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent)}
.part-badge{font-family:var(--fmono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  padding:7px 20px;border-radius:999px;white-space:nowrap;border:1px solid;flex-shrink:0}
.part-badge.bn{color:var(--gold);border-color:rgba(255,209,102,.4);background:rgba(255,209,102,.05)}
.part-badge.en{color:var(--cyan);border-color:rgba(0,245,212,.4);background:rgba(0,245,212,.05)}
.part-title{font-family:var(--fen);font-size:clamp(1.5rem,3.2vw,2.2rem);font-weight:800;text-align:center;margin-bottom:4px}
.part-title.bn-t{color:var(--gold)}
.part-title.en-t{color:var(--cyan)}
.part-desc{text-align:center;color:var(--muted);font-family:var(--fbn);font-size:.9rem;margin-bottom:40px}

/* ── CATEGORY ── */
.cat-sec{margin-bottom:52px}
.cat-header{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.cat-badge{font-family:var(--fmono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  padding:3px 10px;border-radius:999px;border:1px solid currentColor;opacity:.7;flex-shrink:0}
.cat-title{font-family:var(--fen);font-size:clamp(1rem,2.3vw,1.45rem);font-weight:700;flex-shrink:0}
.cat-line{flex:1;height:1px;background:linear-gradient(90deg,var(--glass-b),transparent)}
.romantic .cat-title,.romantic .cat-badge{color:var(--pink)}
.romantic .cat-line{background:linear-gradient(90deg,rgba(247,37,133,.3),transparent)}
.sad .cat-title,.sad .cat-badge{color:var(--blue)}
.sad .cat-line{background:linear-gradient(90deg,rgba(116,185,255,.3),transparent)}
.thriller .cat-title,.thriller .cat-badge{color:var(--gold)}
.thriller .cat-line{background:linear-gradient(90deg,rgba(255,209,102,.3),transparent)}
.scifi .cat-title,.scifi .cat-badge{color:var(--cyan)}
.scifi .cat-line{background:linear-gradient(90deg,rgba(0,245,212,.3),transparent)}

/* ── GRID ── */
.bubble-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1100px){.bubble-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:720px){.bubble-grid{grid-template-columns:repeat(2,1fr);gap:10px}}
@media(max-width:440px){.bubble-grid{grid-template-columns:1fr}}

/* ── BUBBLE WRAP ── */
.bwrap{display:flex;flex-direction:column;gap:8px}

/* ── BUBBLE ── */
.bubble{
  position:relative;background:var(--glass);
  backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);
  border:1px solid var(--glass-b);border-radius:var(--r);
  padding:16px 18px 14px;cursor:pointer;overflow:hidden;user-select:none;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .3s;
  animation:floatY var(--fd,6s) ease-in-out infinite;animation-delay:var(--fl,0s);will-change:transform;
}
.bubble::before{content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 55%);pointer-events:none}
.bubble:hover{transform:translateY(-6px) scale(1.025);
  box-shadow:0 18px 44px rgba(0,0,0,.5),0 0 28px var(--glow,rgba(0,245,212,.12))}
.bubble.open{border-color:var(--glow-c,var(--cyan));
  box-shadow:0 0 20px rgba(0,245,212,.2),0 8px 30px rgba(0,0,0,.4)}
.romantic .bubble{--glow:rgba(247,37,133,.18);--glow-c:var(--pink)}
.sad .bubble     {--glow:rgba(116,185,255,.18);--glow-c:var(--blue)}
.thriller .bubble{--glow:rgba(255,209,102,.18);--glow-c:var(--gold)}
.scifi .bubble   {--glow:rgba(0,245,212,.18);--glow-c:var(--cyan)}
.b-id{font-family:var(--fmono);font-size:8px;letter-spacing:.2em;color:var(--muted);opacity:.55;margin-bottom:7px}
.b-name{font-family:var(--fbn);font-size:clamp(.9rem,1.5vw,1.05rem);font-weight:700;color:var(--text);line-height:1.3;margin-bottom:5px}
.b-name.en{font-family:var(--fen);font-size:clamp(.82rem,1.3vw,.97rem)}
.b-story{font-size:.74rem;font-weight:500;line-height:1.4}
.romantic .b-story{color:var(--pink)}
.sad .b-story    {color:var(--blue)}
.thriller .b-story{color:var(--gold)}
.scifi .b-story  {color:var(--cyan)}
.b-arrow{position:absolute;bottom:11px;right:13px;font-size:11px;opacity:.4;
  transition:opacity .3s,transform .3s}
.bubble.open .b-arrow{opacity:1;transform:rotate(180deg)}
/* Ripple */
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.13);
  transform:scale(0);animation:ripA .5s linear;pointer-events:none}
@keyframes ripA{to{transform:scale(4);opacity:0}}

/* ── PREVIEW BOX ── */
.preview-box{
  background:rgba(10,8,28,.85);
  border:1px solid var(--glass-b);
  border-radius:14px;padding:18px 20px 16px;
  display:none;animation:slideD .38s cubic-bezier(.22,1,.36,1);
}
.preview-box.visible{display:block}
.preview-box.romantic{border-color:rgba(247,37,133,.3)}
.preview-box.sad     {border-color:rgba(116,185,255,.3)}
.preview-box.thriller{border-color:rgba(255,209,102,.3)}
.preview-box.scifi   {border-color:rgba(0,245,212,.3)}
.preview-lbl{font-family:var(--fmono);font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.preview-text{font-family:var(--fbn);font-size:.88rem;line-height:2;color:#cccce8;font-weight:400}
.preview-text.en-prev{font-family:'Syne',sans-serif;font-size:.82rem;line-height:1.85;color:#cccce8}

/* ── CTA BUTTON ── */
.cta-btn{
  display:block;width:100%;margin-top:14px;padding:14px 16px;
  background:linear-gradient(135deg,rgba(0,245,212,.15) 0%,rgba(181,23,158,.15) 100%);
  border:1px solid rgba(0,245,212,.5);border-radius:12px;
  font-family:var(--fbn);font-size:.86rem;font-weight:700;
  color:var(--cyan);text-align:center;cursor:pointer;
  box-shadow:0 0 18px rgba(0,245,212,.2),0 0 40px rgba(0,245,212,.05);
  transition:all .25s ease;position:relative;overflow:hidden;
  animation:pulseGlow 2.2s ease-in-out infinite;
}
.cta-btn.en-btn{font-family:var(--fen);font-size:.8rem}
.cta-btn:hover{
  background:linear-gradient(135deg,rgba(0,245,212,.28) 0%,rgba(181,23,158,.28) 100%);
  box-shadow:0 0 28px rgba(0,245,212,.4),0 0 60px rgba(0,245,212,.12);
  transform:scale(1.02);
}
.romantic .cta-btn{border-color:rgba(247,37,133,.5);color:var(--pink);
  background:linear-gradient(135deg,rgba(247,37,133,.12) 0%,rgba(181,23,158,.12) 100%);
  box-shadow:0 0 18px rgba(247,37,133,.2),0 0 40px rgba(247,37,133,.05)}
.romantic .cta-btn:hover{box-shadow:0 0 28px rgba(247,37,133,.4),0 0 60px rgba(247,37,133,.12)}
.sad .cta-btn{border-color:rgba(116,185,255,.5);color:var(--blue);
  background:linear-gradient(135deg,rgba(116,185,255,.12) 0%,rgba(45,27,105,.12) 100%);
  box-shadow:0 0 18px rgba(116,185,255,.2),0 0 40px rgba(116,185,255,.05)}
.sad .cta-btn:hover{box-shadow:0 0 28px rgba(116,185,255,.4),0 0 60px rgba(116,185,255,.12)}
.thriller .cta-btn{border-color:rgba(255,209,102,.5);color:var(--gold);
  background:linear-gradient(135deg,rgba(255,209,102,.12) 0%,rgba(45,27,105,.12) 100%);
  box-shadow:0 0 18px rgba(255,209,102,.2),0 0 40px rgba(255,209,102,.05)}
.thriller .cta-btn:hover{box-shadow:0 0 28px rgba(255,209,102,.4),0 0 60px rgba(255,209,102,.12)}

/* ── ANIMATIONS ── */
@keyframes floatY{0%{transform:translateY(0)}50%{transform:translateY(-7px)}100%{transform:translateY(0)}}
@keyframes slideD{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{
  0%,100%{box-shadow:0 0 18px rgba(0,245,212,.2),0 0 40px rgba(0,245,212,.05)}
  50%{box-shadow:0 0 32px rgba(0,245,212,.45),0 0 70px rgba(0,245,212,.15)}
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#1a163a;border-radius:99px}
footer{text-align:center;padding:32px 20px 18px;font-family:var(--fmono);font-size:9px;
  letter-spacing:.22em;color:var(--muted);opacity:.35;border-top:1px solid var(--glass-b);
  position:relative;z-index:1}
</style>
</head>
<body>
<div class="wrapper">
<header class="site-header">
  <p class="hdr-eyebrow">✦ Dual Universe · 200 Authors · Bengali &amp; English</p>
  <h1 class="hdr-title">গল্পের জগৎ</h1>
  <p class="hdr-sub">বাংলা ও ইংরেজি সাহিত্যের সেরা লেখকদের নির্বাচিত গল্পের রোমাঞ্চকর প্রিভিউ পড়ুন। প্রতিটি বাবলে ক্লিক করুন, গল্পের স্বাদ নিন।</p>
</header>
<div class="divider"></div>
<div id="app"></div>
</div>
<footer>গল্পের জগৎ · Story Universe · © 2025</footer>

<script>
const L1='https://www.effectivecpmnetwork.com/v79rqb771q?key=ed9eb0e1ee54dd613d01fd72321f609f';
const L2='https://www.effectivecpmnetwork.com/mcdvz5y9b3?key=9a6f9937427c03e6a452d827ff5de053';
const SL=id=>id%2!==0?L1:L2;

/* ════════════════════════════════════════
   BENGALI DATA
════════════════════════════════════════ */
const bnData=[
// ROMANTIC 1-25
{id:1,type:"romantic",name:"কিংকর আহসান",story:"রঙিলা কিতাব",preview:"গভীর রাতে যখন পুরো শহর ঘুমিয়ে পড়ে, তখন সুলেমানের ঘরের টিমটিমে আলোটা জ্বলে ওঠে। সে টেবিলের ওপর রাখা পুরনো ডায়েরিটার পাতা উল্টায়। প্রতিটা পাতায় লুকিয়ে আছে এক অদ্ভুত মায়া, এক রুদ্ধশ্বাস ভালোবাসার গল্প। আচমকা জানালার ওপাশে একটা চেনা ছায়া দেখা যায়। সুলেমান কি তবে তার হারিয়ে যাওয়া ভালোবাসাকে ফিরে পাচ্ছে, নাকি এটি শুধুই মনের ভুল? তার বুকের ভেতর ধক করে ওঠে। চোখের কোণে জমা হওয়া জলটুকু মুছে সে জানালার দিকে এগিয়ে যায়। বাতাসে ভাসছে সেই চেনা পারফিউমের সুবাস, যা একসময় তাকে বাঁচিয়ে রাখত..."},
{id:2,type:"romantic",name:"সাদাত হোসাইন",story:"আরশিনগর",preview:"শহরের শেষ প্রান্তে যে পুরনো কৃষ্ণচূড়া গাছটা আছে, তার নিচে দাঁড়িয়ে ছিল নীলু। চারপাশটা কেমন যেন নিস্তব্ধ, শুধু ঝরা পাতার মর্মর শব্দ ছাড়া আর কিছু শোনা যাচ্ছে না। আজ দীর্ঘ পাঁচ বছর পর রূপমের সাথে তার দেখা হওয়ার কথা। সময়ের নিষ্ঠুর খেলায় দুজনেই বদলে গেছে, কিন্তু মনের গহীনে জমে থাকা সেই টানটা কি আদৌ মুছে গেছে? দূর থেকে একটা চেনা অবয়ব এগিয়ে আসতে দেখে নীলুর হাত দুটো কাঁপতে শুরু করে। ঠিক এই মুহূর্তটার জন্যই তো সে হাজারটা রাত একা একা পার করেছে..."},

{id:34,type:"sad",name:"নাহিয়ান ইসলাম",story:"বিচ্ছেদের পর",preview:"সম্পর্ক ভাঙার প্রথম সপ্তাহগুলো নরকের মতো। প্রতিটা চেনা গান বুক চেরা স্মৃতি জাগায়। চেনা রেস্তোরাঁয় যাওয়া যায় না, কারণ সেখানে তার পছন্দের টেবিলটা এখনও আছে। ফোনের কনট্যাক্টে নামটা আছে, ডিলিট করতে পারছে না। রাতে হঠাৎ মনে হয় একটা মেসেজ করি — তারপর থেমে যায়। কী লিখবে? 'ভালো আছ?' — না, এই প্রশ্ন করার অধিকার আর নেই তার..."},
{id:35,type:"sad",name:"ফারহানা নদী",story:"ধূসর ক্যানভাস",preview:"রঙিন ক্যানভাসে ছবি আঁকা মেয়েটার জীবনটা হুট করেই একদিন সব রঙ হারিয়ে ধূসর হয়ে গেল। ছোটবেলা থেকে শিল্পী হওয়ার স্বপ্ন, কিন্তু পরিবার বলল 'এতে ভবিষ্যৎ নেই।' তারপর চাকরি, বিয়ে, সংসার — সবকিছু হলো। শুধু নিজের জন্য আঁকা হলো না আর। একদিন অফিস থেকে ফিরে পুরনো রঙের বাক্সটা খুলল। কিন্তু হাত নামাতে পারছে না। মনে হচ্ছে, ছবি আঁকার সেই মানুষটা আর নেই..."},

{id:38,type:"sad",name:"তানভীর আহমেদ",story:"শেষ বিকেলের আলো",preview:"বৃদ্ধাশ্রমের বারান্দায় বসে রাস্তার দিকে চেয়ে থাকেন আবদুল করিম সাহেব। তার ছেলে বড় ইঞ্জিনিয়ার, বিদেশে থাকে। ছেলের কথা মনে হলে গর্ব হয় — আবার চোখ ভিজে আসে। মাসে একবার ভিডিও কলে কথা হয়। ছেলে জিজ্ঞেস করে, 'বাবা, ভালো আছ?' তিনি বলেন, 'হ্যাঁ।' কিন্তু কোনোদিন বলা হয় না — বড় একা লাগে, বাবা।"},
{id:39,type:"sad",name:"মুনতাসির মামুন",story:"নিস্তব্ধ শহর",preview:"মহামারীর দিনগুলোতে শহর থেমে গিয়েছিল। রাস্তায় মানুষ নেই, দোকানপাট বন্ধ। কিন্তু সবচেয়ে ভয়ংকর ছিল মানুষের মনের ভেতরের নিস্তব্ধতা। প্রতিদিন কেউ না কেউ চলে যাচ্ছে। ফোনে খবর আসছে। শেষবার কথা বলার সুযোগ হয়নি যাদের সাথে, তাদের অসম্পূর্ণ কথোপকথনগুলো মাথায় ঘুরতে থাকে..."},

{id:41,type:"sad",name:"সাবিহা সুলতানা",story:"অশ্রুভেজা চোখ",preview:"রাতে স্বামী ঘুমিয়ে পড়লে সে বাথরুমে গিয়ে কাঁদে। যেন কাঁদার জায়গাটুকুও নিজের নয়। বিয়ের পর থেকে একের পর এক দাবি, অপমান। কিন্তু কাউকে বলা যায় না — বাবার মান যাবে, পরিবার কষ্ট পাবে। তাই সব হাসিমুখে সহ্য করে, রাতে একা কাঁদে। এই দেশে কত মেয়ে এভাবে প্রতিদিন কাঁদে, তার হিসাব কেউ রাখে না..."},
{id:42,type:"sad",name:"ইমতিয়াজ আহমেদ",story:"স্মৃতির পাতা",preview:"পুরনো অ্যালবামটা খুলে ধুলো সরাতেই বেরিয়ে এলো এক হাসিমুখ। সেই মুখটা আজ পৃথিবীতে নেই। মা। দুই বছর হয়ে গেছে। কিন্তু এখনও মাঝে মাঝে ফোন করে ফেলার ইচ্ছে হয় — তারপর মনে পড়ে। এখনও রান্নায় তার হাতের গন্ধ খোঁজা হয়। এখনও বিপদে পড়লে মনে হয় মা থাকলে বলতাম। কিছু মানুষের অনুপস্থিতি কখনো মানিয়ে নেওয়া যায় না..."},
{id:43,type:"sad",name:"আদনান সামি",story:"কালো মেঘ",preview:"আকাশের কালো মেঘ বৃষ্টি হয়ে ঝরে পড়ে শান্ত হয়। কিন্তু মনের ভেতরের কালো মেঘ কখনো শান্ত হতে চায় না। রাশেদের জীবনে একের পর এক আঘাত এসেছে। চাকরি গেছে, সম্পর্ক ভেঙেছে, বাবা অসুস্থ হয়েছেন। প্রতিটা ধাক্কায় উঠে দাঁড়িয়েছে, কিন্তু ভেতরে ভেতরে কিছু একটা শেষ হয়ে যাচ্ছে। আর কতটা সামলানো যায়?"},
{id:44,type:"sad",name:"রাইহান চৌধুরী",story:"শূন্য পকেট",preview:"মাসের শেষে পকেট খালি। মেসের ভাড়া বাকি। টিউশনির ছাত্র ছেড়ে দিয়েছে। বন্ধুদের কাছে চাওয়া যায় না — লজ্জা লাগে। ফ্রিজে শুধু কিছু ডাল আর পেঁয়াজ। এই মুহূর্তে কী করবে সে? অথচ ভালোবাসার মানুষটা ফোন করে বলছে সন্ধ্যায় ডেটে যেতে। সে মুখে বলল 'ঠিক আছে' — আর ভেতরে ভেতরে হিসাব করছে কোথা থেকে টাকা আসবে..."},
{id:45,type:"sad",name:"ফয়সাল আহমেদ",story:"মধ্যবিত্তের গল্প",preview:"ঈদের বাজারে সবার জন্য কেনাকাটা হয়ে গেল — মায়ের শাড়ি, বোনের সালোয়ার, ছোট ভাইয়ের জামা। কিন্তু নিজের জন্য আর বাজেট নেই। পুরনো জুতোটাই আরেক ঈদ চলবে। কেউ খেয়াল করেনি। পরিবারের মুখের হাসি দেখে মনে হলো এটুকুই যথেষ্ট। মধ্যবিত্তের ঈদ আনন্দটা এরকমই — নিজের কষ্টটা লুকিয়ে সবার সুখ নিশ্চিত করা..."},

{id:60,type:"thriller",name:"ফারহান শাহরিয়ার",story:"লাল ডায়েরি",preview:"পুরনো ট্রাঙ্কের নিচে লাল মলাটের ডায়েরিটা পাওয়া গেল। মৃত দাদুর হাতের লেখা। প্রথম পাতায় লেখা — 'এই ডায়েরি পড়ো না।' কিন্তু পড়া হয়ে গেল। আর তার পরদিন থেকে বাড়িতে অদ্ভুত সব ঘটনা শুরু হলো। দরজা নিজে নিজে খোলে, আয়নায় অন্য কারও মুখ দেখা যায়, রাতে দাদুর কণ্ঠস্বর শোনা যায়। ডায়েরির শেষ পাতায় লেখা — 'এখন তুমিও জড়িয়ে গেছ...'"},
{id:61,type:"thriller",name:"আসিফ মেহরাব",story:"মাস্টারমাইন্ড",preview:"কেন্দ্রীয় ব্যাংকের ভল্ট থেকে এক টাকাও স্পর্শ না করে ৫০০ কোটি টাকা গায়েব। সিসি ফুটেজে কেউ নেই, অ্যালার্ম বাজেনি, নিরাপত্তাকর্মী কিছু দেখেননি। পুলিশ থেকে ইন্টেলিজেন্স, সবাই হতভম্ব। কে করেছে এটা? কীভাবে? তিন মাস পর একটা বেনামি চিঠি এলো — 'টাকাগুলো ভালো কাজে লাগানো হয়েছে। ধন্যবাদ।' আর সেদিনই দেশের সবচেয়ে বড় দুর্নীতিবাজ আমলার ব্যাংক অ্যাকাউন্ট খালি..."},
{id:62,type:"thriller",name:"কামরুল হাসান",story:"ছদ্মবেশ",preview:"অপরাধীদের ডেরায় ছদ্মবেশে ঢুকে পড়া আন্ডারকভার এজেন্ট রাজের একটাই ভয় — যদি পরিচয় ফাঁস হয়। গত ছয় মাস ধরে সে তাদের বিশ্বাস অর্জন করেছে। কিন্তু আজ মিশন কমান্ডার ফোন করে বলল, 'বেরিয়ে আসো, তুমি আর নিরাপদ নও।' রাজ বুঝল কেউ তার পরিচয় ফাঁস করে দিয়েছে। কিন্তু কে? আর সে এখন চারপাশ থেকে ঘেরা..."},
{id:63,type:"thriller",name:"ইশতিয়াক চৌধুরী",story:"ডেড এন্ড",preview:"গুগল ম্যাপে সংকেত পেয়ে অচেনা রাস্তায় ঢুকে পড়ল গাড়িটা। রাত তখন ৯টা। চারপাশে ঘন বন। হঠাৎ নেটওয়ার্ক গেল, ম্যাপ বন্ধ হলো। আরও কিছুটা যাওয়ার পর দেখা গেল রাস্তা শেষ। ব্যাক করতে গিয়ে দেখল পেছনে আরেকটা গাড়ি দাঁড়িয়ে, হেডলাইট জ্বালিয়ে। মোবাইলে কোনো সিগনাল নেই। সামনে অন্ধকার বন, পেছনে অজানা গাড়ি। এখন কী করবে তারা?"},
{id:64,type:"thriller",name:"তারেক আজিজ",story:"শিকার",preview:"সুন্দরবনের গহীনে ফরেস্ট অফিসার জামালের টহল। হঠাৎ বনের ভেতর থেকে গুলির শব্দ। বাঘ শিকারের দল। জামাল সিনিয়রকে রেডিওতে জানাল। কিন্তু কিছুক্ষণ পরই রেডিও বন্ধ হয়ে গেল। এবং জামাল আবিষ্কার করল, তাকেও শিকার করা হচ্ছে। চোরাশিকারীরা জানে সে তাদের দেখে ফেলেছে। বনের ভেতরে একা জামাল, আর ছয়জন সশস্ত্র শিকারি..."},
{id:65,type:"thriller",name:"সাইফুল ইসলাম",story:"ব্ল্যাকমেইল",preview:"একটা ফেক স্ক্রিনশট। সেটাই যথেষ্ট সম্ভ্রান্ত পরিবারের মেয়েটার জীবন ধ্বংস করতে। ব্ল্যাকমেইলার চাইছে টাকা, নাহলে সব ছড়িয়ে দেবে। মেয়েটা পুলিশে গেল। কিন্তু তদন্তে বেরিয়ে এলো অবাক করা তথ্য — ব্ল্যাকমেইলারের আইপি অ্যাড্রেস তার নিজের বাড়িতেই পয়েন্ট করছে। তার মানে কি বাড়ির ভেতরেই কেউ করেছে এই কাজ?"},
{id:66,type:"thriller",name:"আদনান করিম",story:"খুনী",preview:"খুনের দৃশ্যে আঙুলের ছাপ নেই, পায়ের ছাপ নেই, চুল নেই। শুধু একটা সাদা গোলাপ রেখে যায় সে। এটাই তার সিগনেচার। পুলিশ ছয়টা মামলায় এই একই সিগনেচার পেয়েছে। কিন্তু কোনো সূত্র নেই। হঠাৎ একদিন একটা খাম পাঠাল খুনি — সরাসরি তদন্ত কর্মকর্তার নামে। ভেতরে একটা ছবি। পরের শিকারের ছবি, তারিখ সহ..."},
{id:67,type:"thriller",name:"মেহজাবিন চৌধুরী",story:"মায়াজাল",preview:"হিপনোটিজম বা মেসমেরিজম বিদ্যা ব্যবহার করে ভিড়ের মাঝে মানুষকে অজ্ঞান করে সব লুটে নেওয়া এক রহস্যময় চক্র। শিকাররা পরে কিছুই মনে করতে পারে না — কখন ঘটল, কীভাবে ঘটল। পুলিশের কাছে কোনো প্রমাণ নেই। একমাত্র সাইকোলজিস্ট ডা. পারভিন বুঝতে পেরেছেন কীভাবে কাজ করে এই চক্র। কিন্তু তাকে থামাতে পারার আগেই তিনি নিজেই একদিন হিপনোটাইজড হলেন..."},
{id:68,type:"thriller",name:"তাসনিম ফেরদৌস",story:"রহস্যময়ী",preview:"নতুন ভাড়াটিয়া তরুণী। পাড়ায় কেউ তাকে চেনে না। গভীর রাতে দামি গাড়ি আসে। ভোরে চলে যায়। প্রতিবেশীরা কথা বলার চেষ্টা করলে ঠাণ্ডা হাসি দেয়। একদিন তার ঘর থেকে জোরে চিৎকার শোনা গেল। পরদিন সব চুপচাপ। তৃতীয় দিন থেকে সে নেই, কিন্তু ঘরের দরজায় তালা নেই, ভেতরে সব গুছানো। শুধু দেয়ালে লেখা একটা ঠিকানা..."},
{id:69,type:"thriller",name:"আবির মাহমুদ",story:"কোড নেম",preview:"স্পেশাল ব্রাঞ্চের ফাইল থেকে একটা কোড নেম গায়েব হয়ে গেছে — 'প্রজাপতি'। এই কোড নেমের অধীনে একটাই মিশন ছিল, যা কখনো সম্পন্ন হয়নি। এখন হঠাৎ দেশে একটার পর একটা বিস্ফোরণ ঘটছে, একই নিয়মে। গোয়েন্দা রিয়াদ বুঝল — প্রজাপতি ফিরে এসেছে। কিন্তু প্রজাপতি কে? এবং কেন এত বছর পর আবার শুরু করেছে?"},
{id:70,type:"thriller",name:"রাশেদুল ইসলাম",story:"ফাঁদ",preview:"অনলাইন গেমে 'মহাগুরু' হওয়ার লোভে সাজিদ একটা অ্যাপে সাইন আপ করল। প্রথম মাসে পাঁচ লাখ টাকা পেল। আনন্দে আরও বিনিয়োগ করল। তিন মাস পর অ্যাপটা উধাও। সব টাকা গেছে। কিন্তু ভয়ংকর ব্যাপার হলো, সাইন আপের সময় সে যে পরিচয়পত্র দিয়েছিল, তা দিয়ে তার নামে এখন কয়েক কোটি টাকার ঋণ নেওয়া হয়েছে..."},
{id:71,type:"thriller",name:"সায়মন কবির",story:"টুইস্ট",preview:"গল্পটা শুরু হয় একটা সাধারণ পারিবারিক ঘটনা দিয়ে। বাবা, মা, ছেলে — একটা মধ্যবিত্ত পরিবার। সবকিছু স্বাভাবিক। কিন্তু পৃষ্ঠার পর পৃষ্ঠা উল্টানোর সাথে সাথে ছোট ছোট অসঙ্গতি ধরা পড়তে থাকে। শেষ পাতায় এসে যে টুইস্টটা আসে, তা পড়ে পাঠক বইটা ছুঁড়ে ফেলে দিতে পারেন আনন্দে বা বিস্ময়ে — দুটোই সম্ভব..."},
{id:72,type:"thriller",name:"জাহিদ আনোয়ার",story:"শেষ চাল",preview:"দাবার ঘড়ি টিক টিক করছে। টেবিলের দুই পাশে দুজন মানুষ — একজন পুলিশ, একজন অপরাধী। কিন্তু এই দাবা খেলা কেবল মনের, ঘরের নয়। প্রতিটা চালে একটা করে সত্য বেরিয়ে আসছে। অপরাধী জানে গোয়েন্দার দুর্বলতা। গোয়েন্দা জানে অপরাধীর পরিকল্পনা। কিন্তু শেষ চালটা কে দেবে — এবং সেই চালে কোন জীবন শেষ হবে?"},
{id:73,type:"thriller",name:"মেহেদী হাসান",story:"লুকানো ফাইল",preview:"ল্যাবরেটরির গোপন ড্রয়ার থেকে পেনড্রাইভটা পাওয়া গেল মৃত বিজ্ঞানীর ডেস্কে। পাসওয়ার্ড ভাঙতে তিন দিন লাগল। ভেতরে কী আছে দেখে সাইবার টিমের প্রধান ঠাণ্ডা ঘামে ভিজে গেলেন। একটি ভাইরাসের সম্পূর্ণ ফর্মুলা, যা বাতাসের মাধ্যমে ছড়াতে পারে। এবং একটা নোট — 'এই ফর্মুলা ইতিমধ্যে বিক্রি হয়ে গেছে। শুভকামনা।'"},
{id:74,type:"thriller",name:"শাহিন আহমেদ",story:"অচেনা নম্বর",preview:"গভীর রাতে ফোন বাজল। অচেনা নম্বর। ধরতে ইচ্ছে হলো না। কিন্তু বারবার বাজছে। ধরলেন। ওপাশ থেকে ফিসফিস করে একটা কণ্ঠ বলল, 'আমি তোমার খাটের নিচে আছি। ফোন রেখো না।' তিনি হাসলেন, মনে করলেন প্র্যাংক। কিন্তু পা নামাতে গিয়ে একটা ঠাণ্ডা হাতের স্পর্শ পেলেন..."},
{id:75,type:"thriller",name:"তানভীর হাসান",story:"ডাবল গেম",preview:"একই সাথে পুলিশ আর অপরাধী — দুই পক্ষের হয়ে কাজ করছে মাশুক। প্রতিটা সিদ্ধান্তে ভুল করলে যেকোনো পক্ষ তাকে শেষ করে দিতে পারে। কিন্তু এই ডাবল গেম সে খেলছে কেন? শুধু টাকার জন্য নয় — তার পেছনে একটা ব্যক্তিগত প্রতিশোধের গল্প আছে। যে মানুষটার জন্য সে এই ঝুঁকি নিচ্ছে, সে কি আদৌ জানে?"},

{id:76,type:"scifi",name:"অন্তিক মাহমুদ",story:"মাংকিকি",preview:"জমিদার বাড়ির ভাঙা সিন্দুকটা খোলার পর সোলেমান একটা অদ্ভুত কাঠের মূর্তি খুঁজে পায়। মূর্তিটার অবয়ব বানরের মতো, কিন্তু চোখ দুটো হুবহু মানুষের মতো জীবন্ত। নিচে ধুলোমাখা কাগজে লেখা — 'নিজের সবচেয়ে বড় লোভের কথা এর সামনে বলো, কিন্তু প্রতিটা ইচ্ছের মূল্য রক্তে দিতে হবে।' সোলেমান হাসতে হাসতে বলল, 'আমি শহরের সবচেয়ে ধনী হতে চাই।' মূর্তির ঠোঁটে ভয়ংকর হাসি। আর সেই রাতেই তার একমাত্র ছেলের ঘর থেকে পৈশাচিক চিৎকার শোনা গেল..."},

{id:79,type:"scifi",name:"নাফিস আহমেদ",story:"টাইম মেশিন",preview:"২০২৬ সালের ঢাকায় বসে বাংলাদেশী বিজ্ঞানী আফসারুজ্জামান তার পুরো জীবনের গবেষণা দিয়ে একটা ডিভাইস তৈরি করলেন। প্রথমবার ব্যবহারে তিনি পৌঁছে গেলেন ২০৫০ সালে। যা দেখলেন তাতে মাথা ঘুরে গেল — পুরো বাংলাদেশ আর নেই। শুধু ধ্বংসস্তূপ। কিন্তু কেন? কীভাবে? এই ভবিষ্যৎ কি বদলানো সম্ভব? আর বদলাতে গেলে কী মূল্য দিতে হবে?"},

{id:88,type:"scifi",name:"সাইফ আহমেদ",story:"অভিশাপ",preview:"পুরনো বাড়িতে শোভা পাচ্ছে একটা বিশাল আয়না। প্রায় দুইশো বছরের পুরনো, ফ্রেমে ফুলপাতার কারুকাজ। আয়নার সামনে দাঁড়ালে প্রথমে নিজেকেই দেখা যায়। কিন্তু কিছুক্ষণ তাকিয়ে থাকলে নিজের চেহারা পরিবর্তন হতে শুরু করে। বৃদ্ধ হতে থাকে, পচতে থাকে — মৃত্যুর দৃশ্য। গৃহপরিচারিকা বলল, 'এই আয়না যে কিনেছে, সে বেশিদিন বাঁচেনি।'"},
