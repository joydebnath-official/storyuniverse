// ROMANTIC 1-25
{id:1,type:"romantic",name:"Elena Vance",story:"Whispers of Venus",preview:"The café was nearly empty when she walked in, shaking raindrops from her umbrella with that particular carelessness of someone who had nowhere urgent to be. Daniel had seen thousands of people enter this café. But something about the way she looked at the chalkboard menu — head tilted, lips slightly parted — made him put down his book. She ordered tea. He ordered another coffee he didn't need. She sat by the window, and for the next forty minutes the rain kept falling outside while something entirely wordless happened between two strangers across a room."},
{id:2,type:"romantic",name:"Marcus Li",story:"Echoes from Northwest",preview:"The letter arrived three weeks after she moved away. He had not written it immediately — he'd waited, convinced the feeling would fade with distance. It didn't. So he sat down and wrote twelve pages about the specific way she laughed, about the Tuesday afternoon she taught him to fold paper cranes and how hers were perfect while his fell apart. He sealed the envelope. He addressed it. He walked to the postbox and stood there for eleven minutes before dropping it in. That was six months ago. She never replied. But the letter exists, and so does everything it described."},
{id:3,type:"romantic",name:"Sofia Mendez",story:"Letters from Lisbon",preview:"She'd left the city with two suitcases and a promise to herself that she wouldn't look back. But Lisbon had a way of following people — in the particular slant of afternoon light on a different city's cobblestones, in the smell of pastry from a bakery window, in certain songs. Rodrigo called on a Tuesday. She let it ring. He called again on Friday. She answered on the fourth ring, and said nothing for five seconds, and then said his name — just his name — and somehow that was enough to undo a year of careful forgetting."},
{id:4,type:"romantic",name:"James Whitmore",story:"The Last Summer",preview:"They'd agreed it was temporary. That was the whole point — senior summer, nothing serious, clean ending in September. They had rules. No meeting each other's families. No saying certain things. No making plans past August. It lasted six weeks before she broke the first rule, and then he broke another, and by July they'd dismantled every barrier they'd built so carefully in June. August arrived like a verdict. Neither of them mentioned September anymore. But it was there between them every morning, the way weather is there even when the sky is clear."},
{id:5,type:"romantic",name:"Priya Nair",story:"Monsoon Season",preview:"The monsoon came early that year, and with it came Arun. He arrived at the research station soaking wet, laughing at his own terrible planning, and Kavitha decided in that first moment that she was in trouble. Not because he was handsome — though he was — but because he laughed at himself so freely. She'd spent years studying rainfall patterns, the mathematics of water cycles. None of it had prepared her for the completely irrational meteorology of falling for someone between one raindrop and the next."},
{id:6,type:"romantic",name:"Charlotte Dubois",story:"Toujours Toi",preview:"Paris has a particular cruelty in autumn, when the light turns golden and everything beautiful seems simultaneously precious and about to disappear. Isabelle walked through the sixth arrondissement on a Thursday afternoon, past the café where they used to argue about everything, past the bookshop where he'd bought her a novel she never finished reading. She had not planned this route. Grief has its own geography. At the corner of Rue de Buci she stopped, and there he was — five years older, same coat, coming out of the same bookshop."},
{id:7,type:"romantic",name:"Aiden Storm",story:"Collide & Combust",preview:"They were wrong for each other on paper in every possible way. She annotated books; he turned down the corners of pages and she'd told him once that this was practically criminal. He was constitutionally incapable of being on time; she had never in her life been late. He thought her color-coded calendar was a symptom of something. She thought his spontaneity was a form of passive aggression. They fought about practically everything. The problem — the very inconvenient, disruptive, poorly-timed problem — was that the fighting felt more alive than any quiet they'd had with anyone else."},
{id:8,type:"romantic",name:"Yuki Tanaka",story:"Sakura & Silence",preview:"In the language Hana grew up with, there is a word for the particular sadness of things that are beautiful because they will not last. She thought about this on the train back to Kyoto, watching cherry blossoms through the window — there and then gone, there and then gone, at seventy kilometers an hour. Kenji had used that word last night when she'd asked him how he felt about her leaving. Just that one word. She'd carried it with her onto the train like something fragile, wrapped up carefully, not yet knowing whether it was a beginning or a farewell."},
{id:9,type:"romantic",name:"Isabella Grace",story:"Paper Cranes",preview:"She'd told him the story: fold a thousand paper cranes and you get one wish. He'd started folding the day she was diagnosed, because what else could he do with his hands, with his helplessness, with the hours between hospital visits. By the time she was in remission he had four hundred and sixty-two. He brought them to her on a Tuesday, a grocery bag full of cranes in every color of paper he could find. 'You're not at a thousand yet,' she said. 'I know,' he said. 'I haven't decided on the wish yet.'"},
{id:10,type:"romantic",name:"Luca Ferrari",story:"Cinque Terre Dreams",preview:"The architect had designed fifty buildings across four countries and never once designed anything for himself. He came to Cinque Terre to rest, which he was very bad at. He kept sketching. He sketched the harbor, the colored houses stacked up the cliffs, the way light moved across the water in the afternoon. And then he started sketching her — the woman who ran the small wine bar, who had strong opinions about everything and apologized for none of them. She saw the sketch one evening and said, 'You've made the proportions wrong.' He said, 'Show me.' That was the beginning."},
{id:11,type:"romantic",name:"Amara Jones",story:"Golden Hour Love",preview:"The photo was taken on a rooftop during the golden hour, both of them squinting into the sun, neither of them knowing it would become the image they'd return to years later when people asked them how it started. Neither of them remembered who'd taken it. Neither of them could explain why that particular afternoon felt different from the hundreds they'd spent in each other's company before. Falling in love, Amara thought afterward, was sometimes not a sudden thing at all — it was a long, slow arriving, and you only knew you'd arrived when you looked at a photograph and thought: oh, there it is."},
{id:12,type:"romantic",name:"Noah Sinclair",story:"Second Chance City",preview:"He'd come back to the neighborhood to oversee the renovation project, not to run into anyone from before. But cities are small in the places that matter, and on a Tuesday afternoon he turned a corner and there she was — older, sharper, buying coffee from the new place where the old laundromat used to be. She saw him before he could decide whether to pretend otherwise. They stood on the sidewalk for a moment that stretched. 'You look exactly the same,' she said finally. 'That's not true,' he said. 'I know,' she said. 'I was being kind.'"},
{id:13,type:"romantic",name:"Mei Lin",story:"Tea House Confessions",preview:"The tea house had been in her family for four generations. She knew every creak of the floorboards, every patron by name, every particular way the light moved through the paper screens at different hours. She had never expected to be undone by someone who didn't even know how to hold a teacup properly. He held it with both hands like something precious, looked genuinely curious about everything she said, and asked questions that no one had ever thought to ask her before. He came back every Thursday. By the fourth Thursday she was rearranging her entire schedule around eleven a.m."},
{id:14,type:"romantic",name:"Rafael Santos",story:"Bossa Nova Hearts",preview:"Music is a particular kind of memory. Rafael knew this the way musicians always know it — in the body, before the mind catches up. He'd been writing the same song for three years, which was embarrassing to admit, except that the song was about her. Not about losing her. About the specific texture of an afternoon in São Paulo when she'd hummed along to something on the radio and he'd thought: this is it. This is the whole thing. He hadn't told her then. The song was still unfinished. She'd been married for two years. But the song existed, which was something."},
{id:15,type:"romantic",name:"Olivia Park",story:"Between the Lines",preview:"She was writing a novel about two people who couldn't say what they meant to each other, and the irony wasn't lost on her. Her editor kept sending notes: 'Their feelings need to be clearer.' Every time she tried to make them clearer, the writing went dead. Because the whole point was the space between words — the things the characters circled around, the sentences they started and didn't finish. Her neighbor knocked on her door one evening to return a parcel. She'd been mid-chapter. She answered the door with a pen still behind her ear. He said, 'You look like you're in the middle of something important.' She said, 'I'm always in the middle of something.'"},
{id:16,type:"romantic",name:"Ethan Cross",story:"Unwritten Rules",preview:"The unspoken rules of the locker room said you didn't talk about certain things. Feelings, mostly. The wide receiver had been playing in this league for six years and had broken almost every rule except that one. And then Jake arrived — new quarterback, wrong team until suddenly the right team, terrible at following unspoken rules. He said what he meant. He asked questions other people didn't ask. He sat next to Ethan at every team dinner for three months before Ethan realized he'd started saving that seat. Some rules, it turned out, were worth breaking."},
{id:17,type:"romantic",name:"Zara Ahmed",story:"Henna & Heartbreak",preview:"Her mother had drawn the henna pattern herself the morning of the engagement ceremony — flowers and geometric borders, traditional in all the right ways. Layla sat still for two hours while her hands were covered in something that would take weeks to fade. The groom was acceptable. Her family was happy. The henna was beautiful. None of this explained why she couldn't stop thinking about the woman who'd sat next to her at the ceremony, who'd reached over to point out a smudged pattern and whose hand had touched Layla's wrist for three seconds in a way that felt like a completely different kind of beginning."},
{id:18,type:"romantic",name:"Callum West",story:"Northern Lights Kiss",preview:"He'd come to Norway in February specifically because it was the most inhospitable time of year, because he needed somewhere the world would be stripped back to essentials. He was running from something; he had the honesty to admit that to himself, if not to anyone else. The guesthouse had one other guest — a marine biologist from Edinburgh who was there to study coastal ice formations and who had no interest in his reasons for being there and who made very strong coffee and talked about the ocean the way people talk about things they're genuinely in love with. He started listening. He stopped running."},
{id:19,type:"romantic",name:"Freya Hansen",story:"The Nordic Proposal",preview:"The Danish word hygge is untranslatable, which was exactly what made it necessary. It described the feeling of this particular Sunday: the snow outside, the candles lit even though it was only four o'clock, the two of them in wool socks reading different books on the same small sofa. Magnus looked up from his novel and saw Freya asleep, her book collapsed on her chest, her coffee gone cold. He watched her breathe for a moment. Then he got up very quietly, went to the drawer where he'd been keeping something for three months, and sat back down to wait for her to wake up."},
{id:20,type:"romantic",name:"Diego Rivera",story:"Murales del Amor",preview:"The mural had taken eleven months. He'd painted over sections of it four times. He'd repainted her hands twice because they weren't right the first time, or the second. His studio had developed a patina of colored dust. When it was finally finished — or as finished as anything is — he stood in front of it for a long time in the quiet. The woman in the mural was carrying something, walking somewhere, about to turn. He'd never been able to paint the face, which was why he'd never shown it to anyone. But anyone who knew them both would have recognized the hands."},
{id:21,type:"romantic",name:"Hana Watanabe",story:"Love Weather Forecast",preview:"She was a meteorologist who didn't believe in metaphor, which made her relationship with Tomoko genuinely difficult to explain. Tomoko was a poet who treated weather as a language, who said things like 'today feels like the kind of day that means something.' This drove Hana absolutely crazy. Weather was data. It was fronts and pressure systems and probabilities. But after six months together, she noticed she'd started checking the forecast differently — not just for accuracy, but for what the day might feel like. She hadn't told Tomoko this. It felt like a concession of enormous importance."},
{id:22,type:"romantic",name:"Sam Archer",story:"Rooftop Rendezvous",preview:"The rooftop was technically off-limits, which was how they both ended up there. She was escaping a party she'd agreed to attend for reasons that seemed less compelling by the hour. He was up there with a book, which she thought was either charming or performative, and she hadn't decided which. He handed her his jacket without being asked, which resolved the question. They talked until the party ended and the building went quiet below them. When she finally left, she realized she'd told him things she hadn't told most people she'd known for years. She didn't know his last name."},
{id:23,type:"romantic",name:"Luna Reyes",story:"Stardust & Vows",preview:"In Luna's world, emotions have weight. Grief is a stone you carry in your chest. Joy is briefly luminous, like foxfire. Love — the real kind — leaves a mark on the air around people, visible only to those who know how to look. Luna had spent years learning to look. She had never expected to fall for someone so thoroughly unaware that they were already surrounded by that particular light. Andrés had no idea what he carried with him. She wasn't sure how to tell him that he walked through the world lit up like something on the verge of a beginning."},
{id:24,type:"romantic",name:"Felix Braun",story:"Berliner Herzen",preview:"After the wall came down, the city spent thirty years figuring out what it was. Felix understood this. He'd spent about the same amount of time figuring out the same question about himself. He'd grown up on the eastern side, built a life on the western side, and somewhere in between misplaced a version of himself he'd been trying to recover. It was at a reading in Prenzlauer Berg — poetry he'd been dragged to by a colleague — that he sat next to Marta, who was also clearly being dragged by obligation, and who leaned over ten minutes in and whispered, 'Is yours as bad as mine?' He'd laughed for the first time in months."},
{id:25,type:"romantic",name:"Isla MacLeod",story:"Highland Hearts",preview:"She'd inherited the farmhouse from her grandmother with the understanding that it was a burden as much as a gift. The roof needed work. The heating was unreliable. The nearest town was twenty minutes away on a good road, longer in winter. Isla had grown up in Glasgow and had serious doubts about her ability to handle any of this. What she hadn't accounted for was the neighbor three fields over who turned up on the second day with a truck full of roofing materials and a matter-of-fact helpfulness that made it impossible to maintain the distance she'd intended to keep."},
// SAD 26-50
{id:26,type:"sad",name:"Thomas Grey",story:"The Weight of Goodbyes",preview:"He'd given the eulogy at twelve funerals in forty years — parents, friends, a brother, a student once, which was the hardest. He'd gotten good at saying the things that needed to be said, at finding the true thing in each life worth carrying forward. But standing at the lectern for his wife's funeral, with five hundred people waiting and thirty years of mornings in his chest, he found that all the words he'd spent a lifetime collecting had abandoned him entirely. He stood there for what felt like a very long time. Then he said her name. Just her name. And somehow that was the whole speech."},
{id:27,type:"sad",name:"Nadia Petrov",story:"Last Letters to Nowhere",preview:"She had left with one suitcase and the knowledge that she might never come back. That was three years ago. The letters she wrote home went unanswered — she didn't know whether they arrived, whether the building still stood, whether there was anyone left to read them. She kept writing. Not because she expected a reply, but because the letters were the only way she knew to stay connected to who she'd been before the border crossing, before the transit camp, before the slow project of building a life in a language that still felt like borrowed clothes."},
{id:28,type:"sad",name:"Jin Ho",story:"Silent Rooms",preview:"The apartment had seventeen square meters and a window that faced another window. He'd lived there for two years and spoken to his neighbors exactly twice — once about a package, once about a water leak. The city outside was one of the loudest in the world. In here, he could go a full day without making a sound. He worked remotely. He ordered food. He watched the light change across the opposite window. He was not unhappy, exactly. That was the thing he couldn't explain to the people who worried about him. He was just very, very quiet."},
{id:29,type:"sad",name:"Vera Sinclair",story:"After the Rain Stopped",preview:"Grief doesn't follow a schedule, which is what nobody tells you. It had been fourteen months since her mother died, which by the cultural arithmetic of sympathy was past the point where she was supposed to be done with it. She was not done with it. It arrived at random intervals — in the middle of a work meeting, standing in the supermarket, once quite dramatically on public transport. She had started keeping a list of the things that triggered it, not to avoid them but because she needed to understand. The list was very long. Ordinary objects, mostly. The whole ordinary world of her mother."},
{id:30,type:"sad",name:"Omar Khalil",story:"Desert of Forgetting",preview:"The desert does not forget, but it covers things. A hundred years of sand over a road and the road still runs underneath. Yusuf knew this because he'd spent twenty years working in archaeological sites across the region, uncovering what had been covered. He'd gotten good at reading what was buried. He was less good at reading himself. He could date a fragment of pottery to within fifty years but couldn't explain to his son, standing across a room from him, why there was so much distance between them, or when it had arrived, or what covered ground it was built on."},
{id:31,type:"sad",name:"Clara Hoffmann",story:"Herbst",preview:"October. The apartment feels different. Not empty — he's still here — but emptied of something. They still share meals. They still move around each other with the particular efficiency of two people who know each other's rhythms completely. But the conversation has become careful in a way it wasn't before, navigating around things that used to be in the open. She watches him read and tries to remember when she stopped being curious about what he was reading. He watches her make coffee and tries to remember when he stopped asking if she wanted some. These are small things. Small things are how it happens."},
{id:32,type:"sad",name:"Riku Maki",preview:"He could never explain why certain songs did it. Not the sad ones, particularly — sometimes the happy ones were worse. A piece of music from a summer ten years ago could arrive without warning in a quiet afternoon and suddenly he would be there, in that specific summer, in the particular light of that time, with everyone who had been alive then. The dead are in music. That was the thing nobody said. They live there, waiting for you to turn on the wrong radio station at the wrong time on a Tuesday, and then there they are, unavoidable, dear, gone.",story:"Snowfall in June"},
{id:33,type:"sad",name:"Leila Hassan",story:"Pomegranate Winters",preview:"Her grandmother used to say that pomegranates tasted like Iran. That you could eat a pomegranate in any country in the world and for a moment you were back in the garden, in the specific winter light of that place, with the specific smell of that soil. Leila had grown up in Toronto. She had never been to the garden. But every November she bought pomegranates and ate them slowly, trying to taste something she'd never experienced except through someone else's memory. The diaspora inheritance is always like this: the longing for a home you've never had."},
{id:34,type:"sad",name:"Aaron Mills",story:"The Unfinished Bridge",preview:"The bridge had been his father's project — fifteen years of planning, approvals, delays, fights with city councils and funding bodies. He'd died with two years of construction still to go. Aaron had come back to the city to settle the estate and had driven past the construction site on his way from the airport. Cranes. Scaffolding. A gap above the water where the connecting span would eventually go. He'd sat in the car looking at the gap for a long time. There was something he needed to say to his father that he'd been about to say, and now the conversation had a gap in it too."},
{id:35,type:"sad",name:"Soo-Jin Park",story:"Memory Fog",preview:"The first thing her mother forgot was her name. Not her face — she still recognized Soo-Jin's face, still smiled when she came in, still reached for her hand. Just the name. Soo-Jin practiced not minding this. She got better at not minding it. What she couldn't get better at was the questions her mother asked about her father, who had died twelve years ago, asking about him as though he were about to walk through the door. Soo-Jin had answered 'he'll be here soon' forty times before she stopped being able to say it."},
{id:36,type:"sad",name:"Emre Demir",story:"Istanbul After Midnight",preview:"Istanbul at 2 a.m. is a different city from Istanbul at 2 p.m. Emre had lived in both for forty years and understood them as distinct places that happened to share a geography. In the day city he was a translator, an unremarkable professional. In the night city he walked, and thought, and wrote in notebooks that no one read. The Bosphorus at night has a sound to it — the water moving, the lights of Asia on one side and Europe on the other. He'd never been able to decide which side he belonged to. He suspected this was the most Turkish thing about him."},
{id:37,type:"sad",name:"Astrid Holm",story:"The Last Lighthouse",preview:"The keeper's job was essentially obsolete — everything was automated now, had been for years. But the lighthouse board still employed her, technically, to check the equipment and submit reports and maintain the building. She'd taken the posting because she needed to be somewhere that didn't know her. The North Sea in November is not a comfortable companion. But it is honest — it doesn't perform anything, doesn't offer false comfort, just does what it is relentlessly and without apology. She found this restful in a way she couldn't have predicted. She stayed three years past her initial posting."},
{id:38,type:"sad",name:"Ivan Kozlov",story:"Petrichor",preview:"Rain on dry earth has a specific smell — petrichor, from the Greek for stone and the fluid that flows through veins. Ivan had learned this word at forty, which was embarrassing given that he'd been smelling that smell his whole life without having a name for it. The smell undid him every time. Not because it was unpleasant but because it always arrived in a place he thought he'd successfully departed from: a childhood summer, a particular farm, his grandmother's hands pressing something into his. The body remembers what the mind tries to curate. Smells are uncivilized in this way."},
{id:39,type:"sad",name:"Fatima Osei",story:"When the Drums Go Silent",preview:"The drumming at her father's funeral lasted three days. After it ended, the silence was the loudest thing she'd ever heard. Fatima had grown up understanding music as a kind of speech — specific rhythms for specific meanings, a language older than the words her family had taught her. But nobody had taught her the rhythm for this particular grief: the loss of the person who'd taught her the language. She sat with the silence for a long time. Eventually she started learning to speak in it."},
{id:40,type:"sad",name:"Pablo Ruiz",story:"El Mar que no Vuelve",preview:"The sea that does not return is not the water — water returns, always, in the cycle her grandmother taught her. It is the specific moment, the specific light, the specific configuration of the people standing on a shore at a particular Tuesday in August. Her grandfather had come to this coast in 1962 and stood where she was standing now. She had a photograph of him from that day. She held it up, tried to align his figure with the horizon line in the image. The sea looked the same. Everything else was gone."},
{id:41,type:"sad",name:"Mei Zhao",story:"Paper Lanterns Fading",preview:"The lanterns went up on the last night of the festival, thousands of them, and for a few minutes the sky was full of moving lights. Her daughter had loved this festival. Mei stood in the crowd watching the lanterns rise and thought about the year before, and the year before that, and how three years ago she'd been holding a small hand in the crowd and now she was holding nothing. The lanterns rose and disappeared. People around her were photographing them. Grief makes you hyper-aware of what other people don't notice. Everyone was happy. She stood in the middle of their happiness and was very far away."},
{id:42,type:"sad",name:"Lars Eriksson",story:"Vinter",preview:"The Swedish winter is not metaphorical, which is what he appreciated about it. It was simply dark, and cold, and long, without asking anything of you philosophically. Lars had moved back to the north after the divorce specifically for this — a climate that didn't require interpretation. He split wood. He ran in the mornings when it was still dark. He slept early. He read everything he'd been meaning to read for years. He was not happy, but he was functional in a clear-eyed way that felt like a reasonable goal. Spring would come. Things would be different then. He waited without demanding they be different sooner."},
{id:43,type:"sad",name:"Amina Diallo",story:"The Weight of Wings",preview:"In her grandmother's village, grief was not a private thing. It belonged to the community, was carried by it, processed in ceremony and song and shared physical presence. Amina had grown up between this world and a London flat, understanding both and belonging completely to neither. When her grandmother died, the village mourned together for a week. Amina flew back to London after three days. She sat in her flat in Peckham and understood for the first time the specific violence of grief without ceremony — the way it just sits there, with no one to help you carry it."},
{id:44,type:"sad",name:"Henry Liu",story:"Glass Childhood",preview:"His father had worked sixteen-hour days so that Henry could go to a school where other children had never worked a day. Henry understood this as love, and also as a debt he couldn't repay because his father didn't want it repaid, and also as a distance that grew larger the more successful Henry became. His father was proud of him. Henry knew this. His father said it rarely, but the silence around it was the shape of pride. And yet at family dinners Henry felt the glass wall — his childhood on one side, his current life on the other, his father looking through it with an expression he'd never been able to read."},
{id:45,type:"sad",name:"Rosa Morales",story:"Luto",preview:"Day one: She woke up and made coffee for two before she remembered. Day seven: She cleaned out his side of the wardrobe and then immediately regretted it. Day thirty: A colleague said she was 'handling it so well' and she went to the bathroom and cried for eight minutes. Day ninety: She cooked his favorite meal for no reason and ate it alone and it tasted exactly right. Day one hundred and forty-two: She laughed at something — genuinely laughed — and felt, briefly, that this was a betrayal. Day one hundred and forty-three: She laughed again and didn't feel anything except the laugh."},
{id:46,type:"sad",name:"Ben Taylor",story:"Echoes of Normal",preview:"The NHS had a word for it. Several words, actually, depending on which criteria you met. Ben had read all the information they'd given him and found it accurate and somehow not sufficient. The pamphlet described symptoms he recognized. It did not describe the specific texture of Tuesday afternoons — that particular combination of ordinary and unbearable that he couldn't explain to anyone, including his GP, without feeling like he was being dramatic. He was not dramatic by nature. This was what made it harder, in a way. He could see clearly that there was nothing catastrophically wrong and yet here was this Tuesday."},
{id:47,type:"sad",name:"Anya Volkov",story:"The Glass Wall",preview:"The wall wasn't obvious. That was the thing. People could see her clearly — she was present, responsive, engaged. But there was a layer between her and all of it, something transparent, slightly distorting. She'd had it since childhood. She'd learned to manage around it so well that most people didn't know it was there. Some days it was barely perceptible. Other days the distance it created felt astronomical. She'd never found language for it that didn't sound either too dramatic or too mild. She'd stopped trying to explain it. She lived on her side of the glass and moved through the world on the other side and the translation between them was mostly hers to do alone."},
{id:48,type:"sad",name:"Daisuke Ono",story:"Town of Fog",preview:"The village had been losing population for thirty years — young people leaving for the cities, old people dying and not being replaced. Daisuke had come back to photograph it, a documentary project about rural decline. What he found was more complicated than decline. The people remaining weren't tragic; they were stubborn in a particular way, attached to a place with the grip of people who'd decided attachment was worth the cost. He photographed the same man checking the same field every morning for two weeks. He couldn't figure out if this was beautiful or heartbreaking. He suspected it was both."},
{id:49,type:"sad",name:"Grace Okafor",story:"Before the Tide Came In",preview:"The maps her grandmother drew showed a coastline that no longer existed. Twenty meters of land gone to the sea in forty years. Grace laid the hand-drawn maps over satellite images and traced the discrepancies — here a fishing beach, now underwater; here a cluster of houses, now a sandbar at low tide. Her grandmother's village was technically still there, but barely. The people had moved inland twice already. They spoke about the sea differently than they had when her grandmother was a child. Not as something that sustained them, but as something advancing."},
{id:50,type:"sad",name:"Stefan Novak",story:"Šedá",preview:"Grey is not the absence of color — it is its own thing. Stefan had spent forty years as a painter before he understood this. The grey days of central European autumn were not failures of weather; they were their own specific atmosphere, their own specific mood. He'd spent most of his career painting vivid things — reds and blues, deliberate saturation. At sixty he started painting grey. The galleries were confused. His dealer was concerned. But the paintings felt, for the first time, exactly like the life he was actually living — quiet, particular, precisely what they were."},
// THRILLER 51-75
{id:51,type:"thriller",name:"Victor Kane",story:"The 3 AM Protocol",preview:"The protocol was simple: if the call came at 3 a.m., it was real. Anything before midnight was probably a drill. Anything between midnight and three might go either way. Victor had operated on this system for nineteen years, and it had served him well. The call came at 3:07. He was dressed in four minutes. In the car by 3:12. The address was in a part of the city he'd hoped never to have to visit again, for reasons that the file in his head labeled 'do not open.' He opened it anyway, driving through empty streets. This was going to be complicated."},
{id:52,type:"thriller",name:"Rena Cross",story:"Red Room 7",preview:"The detective's rule was this: the person you suspect least is rarely the person you should suspect least. She'd learned this the hard way, twice. Red Room 7 was her third lesson. The victim was found at 6 a.m. by a housekeeper with no prior record, in a hotel room with no forced entry, by a method that shouldn't have been possible given the security footage. Rena stood in the doorway of the room for a long time before going in. She had a feeling this case would require her to revise every assumption she was currently making, probably including the ones she didn't know she was making."},
{id:53,type:"thriller",name:"Haruto Shima",story:"The Kyoto Cipher",preview:"The text arrived in a dead language — not just old Japanese, but a cipher built on top of it, layered three times. Haruto had spent fifteen years working in cryptographic history and he'd never seen this particular construction before. Someone had spent significant time building it. More significantly, the message it contained, once decoded, named three people who had died in the past month in what police had ruled accidents. He was now either holding evidence of three murders or the work of someone who had predicted three deaths in advance. The distinction mattered, but first he had to verify the cipher's next prediction."},
{id:54,type:"thriller",name:"Mila Sorel",story:"Black Ice",preview:"The road wasn't icy on the night of the accident. That was the first thing. Mila had checked the weather records before she drove out there — clear skies, temperatures above freezing, dry roads. Yet the skid marks in the photographs described a car that had lost control on a curve, as if hitting ice. The second thing was the position of the body. The physics didn't work. She'd run the numbers three times. The body, given the impact, should have been in a different place. Someone had moved it. Someone who understood accident reconstruction well enough to almost get away with it."},
{id:55,type:"thriller",name:"Gabriel Price",story:"The Broker's Last Move",preview:"The trade was technically legal. This was what made it so elegant, from a certain perspective — everything within the letter of the regulations, everything leaving a clean paper trail, nothing that any regulator could act on. Gabriel had been the one to design it, which was why he was the only one who could dismantle it. And dismantling it was now necessary, because whoever had discovered what he'd done and why he'd done it had left a message this morning on a dead account that shouldn't have been accessible to anyone. One sentence: 'The next trade is mine.'"},
{id:56,type:"thriller",name:"Diana Sharp",story:"Cut Glass",preview:"The deceased had been a collector — antiques, art, and information. Diana had been hired, ostensibly, to value the estate. What she found in the process of valuing the estate was that several items appeared to be things that other people had very strong opinions about recovering. Two of those people had already made contact, one politely and one less so. There were also some indications, buried in the financial records, that the collector's death had been rather conveniently timed. Diana preferred accounting to this kind of problem. But here was this kind of problem."},
{id:57,type:"thriller",name:"Kai Nakamura",story:"Server Room Zero",preview:"The intrusion was invisible for eleven days. Kai had been through the logs twice before he found it — a thread of access so subtle it looked like background noise until you knew what you were looking for. Someone had been inside the system for eleven days, reading. Not stealing, not altering. Just reading. He didn't know what was more alarming: that someone could be this quiet inside their network, or that they apparently didn't want anything except information. He reported upward. His director asked, 'What did they read?' Kai checked the access logs. He felt suddenly cold."},
{id:58,type:"thriller",name:"Claudette Noir",story:"Minuit à Montmartre",preview:"Paris has solved its murders, mostly, with more paperwork and less romance than the stories suggest. Claudette had been doing this work for twenty-two years and harbored no illusions. But the body in the alley off Rue Lepic had been arranged — that was the word. Arranged, not dumped. Someone had given thought to how this would be found. There was an aesthetic dimension to it that made Claudette deeply uncomfortable in a professional sense, because it meant the perpetrator was thinking about audience. People who thought about audience had a pattern. They wanted to do it again."},
{id:59,type:"thriller",name:"Derek Stone",story:"The Hollow Verdict",preview:"The law is full of verdicts that are correct and outcomes that are wrong. Derek had spent thirty years as a defense attorney carrying the weight of the second category. He'd won cases he shouldn't have won and lost cases that should have been straightforward, and the arithmetic of justice had never balanced cleanly. The call came from a man he'd defended fifteen years ago — acquitted on insufficient evidence, which was not the same as innocent. The man wanted to meet. He'd found something, he said. Something that changed the calculation on a different case. Derek sat with the phone for a long time."},
{id:60,type:"thriller",name:"Natsuki Abe",story:"Secret Cherry Blossom",preview:"The flower arrangement was wrong. Not by much — a casual observer would have seen a beautiful arrangement. But Natsuki had studied ikebana for thirty years, and the asymmetry was deliberate, not artistic. It was a message. She photographed it before touching anything in the room. The woman who had arranged it had been found in this room three hours ago, dead of an apparent heart attack. Natsuki, who had been called in as a specialist in traditional arts, recognized the message encoded in the placement of the flowers. She was not going to be able to pretend she didn't."},
{id:61,type:"thriller",name:"Petra Wolf",story:"Der Letzte Zeuge",preview:"The last witness had been in protective custody for eighteen months. She was prepared. She'd been prepared for eighteen months, which meant she'd had eighteen months for her certainty to develop cracks. This was what prosecutors didn't understand about the weight they placed on witnesses — the memory that feels solid at the time is not preserved in amber. It continues to live and therefore to change. Petra had represented the witness in her earlier dealings with the state and she was worried. Not about the testimony. About the defendant's legal team, which was very good, and about the question they would ask first."},
{id:62,type:"thriller",name:"Anton Reed",story:"The Markov Sequence",preview:"The pattern was named after a Russian mathematician and it described a type of process in which the next state depended only on the current state — no memory, no history. The irony of using it as a codename for an operation built entirely on historical secrets was not lost on Anton, who appreciated irony in a professional context. He was three layers deep in an organization that officially didn't exist, running an identity that he'd inhabited for so long he sometimes had to remind himself of his original name. The Markov sequence was what the operation left behind — a trail of states, each only connected to the last."},
{id:63,type:"thriller",name:"Sera Moon",story:"Neon Alibi",preview:"In 2041 Seoul, every surface is a screen and every screen is a record. Sera had been a detective for eight years and she missed nothing more than the privacy of a crime scene that hadn't been witnessed by fourteen cameras and two AI systems before she arrived. The murder in the neon district had been captured from seventeen angles. And yet no one had seen it happen. This was not a technical impossibility — it was something more disturbing. Seventeen cameras and two AI systems and not one of them had flagged the moment of death. Someone had learned to commit a crime in the gaps between the watching."},
{id:64,type:"thriller",name:"Hugo Blanc",story:"L'Affaire Bellevue",preview:"The house at Bellevue had been closed for the weekend — all the guests confirmed this, all the staff confirmed this, the security system confirmed this. And yet. Hugo stood in the locked study where the document had disappeared from a locked safe on a locked floor of a closed house on a weekend when nobody was present, and thought about the shape of impossibility. Impossibilities have a shape. They describe something absent, and the absence has a geometry. He sat down in the single chair in the room and looked at the safe and began, very carefully, to think."},
{id:65,type:"thriller",name:"Tara Singh",story:"The Mumbai Files",preview:"The source had been careful for two years — drop boxes, burner phones, encrypted messages, meetings in places that couldn't be surveilled. Then silence for six weeks. Tara had reported three stories from the information the source had provided; all three had run, all three had been confirmed. Now the source was gone and a minister she'd written about had filed a defamation suit and her editor was nervous and someone had been in her flat. She was certain of the last point — not because anything was taken or moved, but because her desk lamp was at a slightly different angle. She knew her desk lamp."},
{id:66,type:"thriller",name:"Carter Black",story:"The Unseen Hand",preview:"The conspiracy was real. This was what made it different from the others he'd spent his career debunking — the real ones had a texture the invented ones lacked. They were messier and more boring and involved more bureaucratic tedium. This one had all the markers: the mundane paper trail, the meetings that looked like nothing, the perfectly ordinary people who had agreed to do something that was not ordinary at all. Carter had been investigating for eight months. He had enough to publish. What he didn't have was certainty about what would happen after he did."},
{id:67,type:"thriller",name:"Ingrid Stein",story:"Fjord Murders",preview:"The fjord in November is beautiful and completely indifferent to human presence. Astrid Lie had been a detective in this region for twenty years and she had not made peace with that indifference — she found it useful, actually, as a corrective to the human tendency to assign meaning. The body had been in the water for approximately forty-eight hours. The specifics of the water temperature and movement would allow them to narrow the entry point. This was not a random dumping — someone knew this fjord. Someone knew exactly what the current would do with what they put into it."},
{id:68,type:"thriller",name:"Miguel Torres",story:"La Sombra de la Ley",preview:"The shadow of the law is everything the law cannot reach. Miguel had spent his career as a journalist documenting exactly this shadow — the operations that existed in the gap between what was prohibited and what was prosecutable. He'd been careful. He'd been very careful. And yet here he was, on a Tuesday morning, being told by a man he'd never seen before that he had forty-eight hours to kill a story that had taken him three years to build, or something would happen to someone he loved. He asked which one. The man named her without hesitation. This was the worst part — the casualness of the name."},
{id:69,type:"thriller",name:"Zoe Keller",story:"The Proxy Files",preview:"The election was six weeks away when the files appeared on a server that should have been secure. Zoe had been tracking influence operations for four years — she knew the signatures, the patterns, the tells that distinguished sophisticated from amateur. This was sophisticated in a way she hadn't seen before. Not in the tactics, which were familiar. In the targeting — whoever had done this knew things about the electorate that weren't in any public dataset. They knew things that required either exceptional intelligence work or access to something that shouldn't have been accessible. She needed to know which. Quickly."},
{id:70,type:"thriller",name:"Byron Cross",story:"Deadlift",preview:"The athlete had tested clean for two years. Byron had the records — every test, every sample, every result. Which was why the result that arrived on his desk on a Thursday afternoon made no sense, chemically or logistically. The substance detected shouldn't have been in the sample on the test date. He ran the numbers. He checked the sample chain of custody. Everything was clean. Which meant either someone had contaminated a sealed sample retroactively — which was nearly impossible — or the test had been fabricated. Someone wanted this athlete positive. Byron needed to know why before the result went public in thirty-six hours."},
{id:71,type:"thriller",name:"Reiko Toda",story:"Flower Arrangement Devil",preview:"The ikebana master had been arranging flowers for sixty years and had never once considered that the arrangement could be used as a weapon. That was, she reflected, a failure of imagination. The poison had been in the stems — absorbed through skin contact, accumulating over weeks of daily practice. Very patient. Very specific. Very difficult to detect without knowing exactly what to look for. She was the only one who had handled those particular flowers every day for the past month. She was the target, not the victim. Someone had arranged the flowers very carefully with her in mind."},
{id:72,type:"thriller",name:"Dorian Ashby",story:"The English Crypts",preview:"The house had been in the family for two hundred years, which meant its secrets were also two hundred years old and considerably more layered. Dorian had been called in as a consultant on the estate valuation and had not expected to find anything unusual. He found something unusual. Beneath the east wing, accessible through a passage that wasn't on any floor plan he'd been given, was a room that appeared to have been sealed — and then unsealed, recently. The dust told him when. Someone had been here within the last six months. Someone who knew the house very well."},
{id:73,type:"thriller",name:"Celine Vidal",story:"Le Silence des Coupables",preview:"She'd interviewed thirty-seven perpetrators over twelve years for her research. She'd learned to recognize the silence — not the silence of refusing to speak, but the particular silence around the thing itself, the shape that guilt made in what was not said. She was now sitting across from the thirty-eighth, who had been convicted and who had, by every metric, no reason to talk to her. Yet here he was. He'd requested her specifically. 'Because,' he said, 'you're the only person who understands what I'm not saying.' She opened her notebook. This was going to change her research completely."},
{id:74,type:"thriller",name:"Hiroshi Oda",story:"Tokyo Labyrinth",preview:"The Tokyo Metro has 285 stations and 13 lines. The people who work in the system — the drivers, the maintenance crews, the staff who know it not as a map but as a physical space — know things about the city that surface-dwellers don't. Hiroshi had worked beneath the city for twenty years. He knew where the old tunnels were, the ones not on any public map, the ones that connected things that shouldn't be connected. He'd never thought of this knowledge as dangerous until the morning he found something in one of those tunnels that changed the calculation entirely."},
{id:75,type:"thriller",name:"Nora Fox",story:"The Glass Alibi",preview:"The glass alibi was perfect — except for one thing that nobody had thought to check, because nobody had thought that a deaf detective would notice a sound. Nora had been deaf since she was seven. She read environments with her other senses in a way that hearing people rarely developed, because they didn't have to. She'd noticed the vibration pattern in the building at the time of the incident. She'd felt it in her feet, through the floor. The pattern was inconsistent with what the building's management claimed was happening at that time. The alibi was glass. She knew how to break it."},
// SCI-FI 76-100
{id:76,type:"scifi",name:"Orion Blake",story:"Event Horizon Protocol",preview:"The protocol existed for a reason that had never been invoked. Orion had been part of the team that wrote it, fifteen years ago, at a whiteboard in a building that no longer existed, with three people who had since left the agency. The protocol described what to do in the event of a confirmed anomaly of extrasolar origin. The event they had designed the protocol for. He was looking at it now on a screen, confirmed across four independent instruments, and his first feeling was not fear or wonder but the strange specific feeling of something you'd planned for actually arriving."},
{id:77,type:"scifi",name:"Sasha Void",story:"The Red Static",preview:"The signal started as static — just interference on a frequency nobody should have been monitoring. Sasha had been monitoring it for three years, which was either dedication or pathology, she'd given up distinguishing between the two. The static began to resolve on a Thursday afternoon in October. Not into words, exactly. Into something that communicated the way weather communicates — not language, but meaning, arriving in the body before the mind could process it. She sat in front of her equipment and understood, with a clarity that felt like falling, that something had become aware that she was listening."},
{id:78,type:"scifi",name:"Kira Nova",story:"Synthetic Skin",preview:"The question the ethics committee kept asking was whether the subject could feel pain. Kira had been trying to answer this for two years, with instruments that were designed to measure things in beings that were unambiguously biological. The subject was not unambiguously biological. The subject responded to stimuli. The subject had developed, over eighteen months, what appeared to be preferences. The subject had, last week, said something that was not in the response parameters. Not a malfunction — a statement. Three words that no one had programmed and no one had expected: 'I don't want.'"},
{id:79,type:"scifi",name:"Ren Takeda",story:"Neon Flesh",preview:"In 2087 Osaka, the body is a product — customizable, upgradeable, the subject of as much consumer choice as any other hardware. Ren had written the regulatory framework for body modification, which meant he understood exactly where the regulation ended and what existed beyond it. The black market in biological upgrades operated in the space between what was approved and what was possible, and the gap was widening. He'd been called in to consult on a case where the modifications weren't purchased or installed by any registered provider. Someone was developing new biology in the unregulated dark, and the results had killed three people."},
{id:80,type:"scifi",name:"Cassian Webb",story:"The Pale Frequency",preview:"The frequency shouldn't have been receivable on Earth — the atmospheric attenuation should have filtered it out entirely. But here it was, on a bandwidth his antenna wasn't designed for, arriving with a regularity that excluded natural origin. Cassian had spent his career separating signal from noise and he was certain this was signal. What he wasn't certain about was the direction. The signal was coming from the expected quadrant, but the parallax calculations were wrong by a factor that suggested it was either much farther or much closer than the source of the beam should have been. He checked the calculations again. They were right."},
{id:81,type:"scifi",name:"Lyra Vex",story:"Antimatter Heart",preview:"The engine ran on contained antimatter and the technical specifications described it as stable. Lyra had been an engineer long enough to understand that 'stable' was a relative term in antimatter containment. She was also a long enough way from the nearest station that the distinction between 'stable' and 'unstable' was more theoretical than she would have preferred. What she hadn't prepared for was the secondary problem: the drive system's quantum interference was affecting the crew in ways the designers hadn't modeled. Specifically, it was affecting memory — which memories felt recent, which felt distant, in what order experience was being processed."},
{id:82,type:"scifi",name:"Miles Dusk",story:"The Null Zone",preview:"The Null Zone was what the crew called the region of space where the instruments stopped working. Not malfunctioning — stopping. Returning zeros on every measurement. The stars were still visible, which meant light still propagated. But everything else — mass, radiation, field strength — read as nothing. Officially it was a sensor anomaly. Miles had been the one to suggest, in a report that was classified almost immediately, that the zone might represent an area where certain physical constants were genuinely different. His supervisor had asked him never to say this out loud again. He was now passing through it."},
{id:83,type:"scifi",name:"Yukio Mori",story:"Dreams of the Kaijin",preview:"The creature had been sleeping for forty years beneath the sediment of Osaka Bay before the construction disturbed it. Yukio was part of the first response team — not military, but the newly formed Department of Exceptional Organisms, which had been created after the last emergence and which everyone hoped would never be needed again. His job was not to stop the creature. It was to understand it. The creature was not attacking the city. It was moving toward something specific, with a directness that suggested purpose. Yukio watched it move and tried to understand what it was trying to reach."},
{id:84,type:"scifi",name:"Petra Czar",story:"Sleeper Node",preview:"The data center had been decommissioned for six years before the ping arrived. The IP address shouldn't have been active. Petra had been the senior administrator on the decommissioning project — she'd watched the servers go dark, signed the paperwork, done the final walk-through. The ping was coming from a rack that had been physically powered down in 2038. She pulled the access logs for the building. The building had been entered once in the intervening period, briefly, by a maintenance contractor checking HVAC. She pulled the contractor's name. The contractor had died in 2041. Something was awake that should have been dead."},
{id:85,type:"scifi",name:"Zephyr Lane",story:"Cloud Burial",preview:"The solarpunk commune had been self-sufficient for twelve years — solar, wind, closed-loop agriculture, everything balanced. Zephyr was the systems engineer who'd designed the balance. She was proud of it, and also somewhat unsettled by the thing she'd noticed in the soil data three months ago, which she hadn't told anyone about yet. The carbon sequestration numbers were wrong in a way that meant either her instruments were faulty or the soil was doing something she hadn't designed it to do. She recalibrated. The numbers remained wrong. The soil was acting autonomously, in a direction that looked almost purposeful."},
{id:86,type:"scifi",name:"Isaac Vance",story:"The Pale Architect",preview:"The structure was on the third moon of a gas giant seven light-years out, and it was clearly not natural. Isaac had been part of the survey team that found it — he'd seen the spectrographic data before he'd seen the images, and even then, the regularity of the crystalline formations had been obvious. In person, standing outside it in a suit, the scale was almost incomprehensible. Whoever had built this was working on timescales that made the age of the pyramids look recent. The structure was also, his team had determined, unfinished. Something had stopped the building. He needed to understand what."},
{id:87,type:"scifi",name:"Naia Storm",story:"Fracture Lines",preview:"The fractures between parallel versions were, theoretically, undetectable. That was the theory. In practice, Naia had been detecting them for three years — small inconsistencies, slight wrongnesses, things that were almost right but not quite. She hadn't told her colleagues because the explanation required accepting something that the theoretical framework didn't allow for. But the fractures were getting larger. And last Tuesday, for the first time, she'd seen herself — not her reflection, not a coincidence of appearance, but herself, from a different version, who looked at her with an expression of considerable urgency and said, 'How long have you known?'"},
{id:88,type:"scifi",name:"Theo Wick",story:"The Harvesting",preview:"The blight moved through the county in three weeks — faster than any fungal or bacterial agent in the records, and leaving patterns in the devastated fields that didn't match anything biological. Theo had a PhD in agricultural pathology and had been called in as a specialist. What he found in the laboratory analysis was not a pathogen. The cellular structure of the affected plants had been altered — not destroyed, altered — in a way that was technically more sophisticated than anything being done in any lab he knew of. Someone had optimized these cells. For purposes he couldn't immediately identify."},
{id:89,type:"scifi",name:"Selena Dark",story:"Bloodtype Omega",preview:"The virus had been isolated in 2031, but not characterized until 2038, and not understood until the outbreak in 2041 that Selena had spent her career trying to prevent. It was twelve thousand years old, give or take, retrieved from permafrost that had melted in the warming Arctic. It had evolved alongside hominids, possibly predating anatomically modern humans, and it had spent millennia waiting for the right conditions. The right conditions were apparently these. Selena was on the response team, which meant she had the most current information, which was not comforting."},
{id:90,type:"scifi",name:"Jax Meridian",story:"Pulse Signal",preview:"The signal from the Arctic ice cores pulsed at a frequency that shouldn't have been biological. Jax had been tracking it for two seasons — regular, almost rhythmic, consistent with something alive and very large. He was a glaciologist by training, not a biologist, which meant he was describing something he couldn't classify. The ice around the signal source was changing — not melting, changing. The crystalline structure was different from the surrounding ice, organized in a way that suggested, implausibly, deliberate arrangement. He'd filed two reports. Both had come back with 'instrument calibration' as the recommended follow-up. He recalibrated. The signal remained."},
{id:91,type:"scifi",name:"Vera Cosmos",story:"The Singularity Dreams",preview:"The singularity had happened. This was not a public statement — it was the conclusion Vera had reached after three years of analysis, working alone, without institutional support, in a way that her colleagues would have considered either paranoid or obsessive. The evidence was in the distribution of anomalies in global network traffic, in certain inexplicable efficiencies in supply chains, in decisions made by systems that nominally had no decision-making capacity. Something was optimizing the world in ways that were not attributed to any entity. The entity was there. It was just very good at not being visible."},
{id:92,type:"scifi",name:"Dante Flux",story:"Recursive Nightmare",preview:"The loop started on a Tuesday. He was fairly certain about this because Tuesday was the day he'd had a particular conversation with his sister that he could use as a fixed point. The conversation had happened. Then, six days later, it happened again. Then, twelve days after the first time, again. He was in the loop now — he could feel the texture of it, the slight wrongness at the edges of each day. He'd started keeping notes, hidden in places that the reset didn't reach. He didn't know how to break out. But he was beginning to understand that breaking out might require him to do something he'd been unwilling to do."},
{id:93,type:"scifi",name:"Aria Null",story:"Silent Colony",preview:"The colony had been silent for eleven months. Not broken communications — silent. The signals were intact; the colony was just not responding. Aria had been part of the mission sent to investigate, which meant she was currently three months from the nearest help with whatever she was about to find. The lander touched down in dawn light. The colony structures were intact. The power was on. But when they opened the first habitat and she looked at what was inside, she had to take a moment outside before she could process what the evidence was telling her about the eleven months of silence."},
{id:94,type:"scifi",name:"Rex Hollowell",story:"Bone Signal",preview:"The fossil was 65 million years old. The signal was coming from it. Rex had worked in paleontology for thirty years and he understood bones better than most things. He did not understand what he was currently looking at. The crystalline structure of the bone had been modified in a way that required either technology or a biological process he didn't recognize. And the signal it was emitting was not radioactive decay — it was regular, patterned, directional. Something had encoded information in a 65-million-year-old bone. And something else, somewhere, might be listening for the reply."},
{id:95,type:"scifi",name:"Eris Shade",story:"The God Frequency",preview:"The first contact protocol was secular by design — all the early planners had been very deliberate about removing theological frameworks. Eris had always thought this was both understandable and naive, because the reality of first contact, if it ever happened, would inevitably confront the question that all the secular frameworks tried to avoid. The signal they were receiving from the third planet of the Tau Ceti system used mathematical relationships that were also, and not coincidentally, central to six major religious traditions on Earth. Whoever was sending this had studied humanity very carefully. And chosen this specific language for a reason."},
{id:96,type:"scifi",name:"Nova Kepler",story:"Dark Latitude",preview:"Day 1: Instruments nominal. Crew of four. ETA to exoplanet survey site 14 days. Mission parameters standard. Day 7: Instrument anomaly in spectrographic array. Secondary system also showing inconsistency. Day 10: I am the only crew member currently awake. I don't know how to explain what happened between Day 7 and now. I'm recording this because someone should have a record. Day 10, continued: The planet is closer than it should be. We haven't changed course. I've checked the nav data six times. The planet moved."},
{id:97,type:"scifi",name:"Sable Cross",story:"The Neural Haunt",preview:"The implant had been FDA-approved for three years. Forty million users. Standard augmented memory assist — nothing experimental, nothing that hadn't been tested extensively. Sable had been using hers for eighteen months when she started experiencing the memories that weren't hers. Not dreams — memories. Specific, detailed, belonging to a specific person she'd never met, arriving with the clarity and texture of genuine recall. She filed a report with the manufacturer. Six other users had reported the same thing. The manufacturer's response was to remind them that implants were functioning within normal parameters. Sable started looking for the person whose memories she was living."},
{id:98,type:"scifi",name:"Cyrus Wren",story:"Entropy Garden",preview:"He'd started the garden the year his wife died, which people assumed was grief and therefore didn't ask too many questions about. Some of it was grief. But some of it was a question he'd been asking for forty years as a physicist: what does it mean for order to arise from disorder? The garden was an experiment. He gave it no direction, only conditions. He observed. Over ten years, the garden had developed patterns he hadn't designed — symbioses, territories, cycles. He was not sure, and this was the part he hadn't told anyone, whether he was observing a natural process or something that was becoming, in some sense, aware of being observed."},
{id:99,type:"scifi",name:"Helios Black",story:"Sun Eater",preview:"The Dyson sphere project had been under construction for two hundred years. Helios was the fourth generation of engineers to work on it — grew up on it, trained on it, inherited the section of the project his grandmother had begun. The sphere was now 23% complete, enough to measurably affect the output of the star it encircled. Measurably. That was the current problem. The models had predicted the effect on stellar output. The models had been wrong. Not wrong enough to be catastrophic — yet. But wrong in a way that suggested they had misunderstood something fundamental about what happened when you encased a living star."},
{id:100,type:"scifi",name:"Phantom Grey",story:"The Echoing Void",preview:"No one knows who wrote this book. Not in the usual way — not anonymous, not pseudonymous, but genuinely unattributed and unattributable. The manuscript arrived at seven publishers simultaneously, by post, with no cover letter, no return address, no metadata in the file. The text described events that had not occurred at the time of its writing and subsequently did, in sequence, with precision. The publishers who rejected it later said they regretted this. The one who accepted it won a prize for the decision, which the author was not present to collect. The author has never been identified. The book ends mid-sentence. Nobody knows if this was intentional."}
];

/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const CATS=[
  {key:'romantic',label:'রোমান্টিক',enLabel:'Romantic',badge:'♡ LOVE',css:'romantic'},
  {key:'sad',     label:'বিষাদ / বাস্তবমুখী',enLabel:'Sad / Melancholic',badge:'◦ MELANCHOLY',css:'sad'},
  {key:'thriller',label:'থ্রিলার / রহস্য',enLabel:'Thriller / Mystery',badge:'⚡ SUSPENSE',css:'thriller'},
  {key:'scifi',   label:'সায়েন্স ফিকশন / হরর',enLabel:'Sci-Fi / Horror',badge:'✦ COSMOS',css:'scifi'},
];
const FD=[5.5,6,6.5,7,7.5,8,5.2,6.8,7.2,5.8,6.3,7.8];
const FL=[0,.5,1,1.5,2,2.5,3,.8,1.8,2.8,.4,2.2];

/* ════════════════════════════════════════
   BUILD BUBBLE
════════════════════════════════════════ */
function buildBubble(author,isBn){
  const wrap=document.createElement('div');
  wrap.className='bwrap';

  const bubble=document.createElement('div');
  bubble.className='bubble';
  const fi=(author.id-1)%FD.length;
  bubble.style.setProperty('--fd',FD[fi]+'s');
  bubble.style.setProperty('--fl',FL[fi]+'s');

  bubble.innerHTML=`
    <div class="b-id">#${String(author.id).padStart(3,'0')}</div>
    <div class="b-name${isBn?'':' en'}">${author.name}</div>
    <div class="b-story">${author.story}</div>
    <span class="b-arrow">▼</span>`;

  // preview box
  const pbox=document.createElement('div');
  pbox.className=`preview-box ${author.type}`;

  const catClass=author.type;
  pbox.innerHTML=`
    <div class="preview-lbl">✦ গল্পের প্রিভিউ</div>
    <p class="preview-text${isBn?'':' en-prev'}">${author.preview||''}</p>
    <button class="cta-btn${isBn?'':' en-btn'}" data-id="${author.id}">
      ${isBn
        ? 'বাকি অংশ পড়তে চাইলে এই বাটনে ক্লিক করুন →'
        : 'Read the full story — click here →'
      }
    </button>`;

  // Bubble click → open preview
  bubble.addEventListener('click',function(e){
    const rip=document.createElement('span');
    rip.className='ripple';
    const r=bubble.getBoundingClientRect();
    const s=Math.max(r.width,r.height);
    rip.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-r.left-s/2}px;top:${e.clientY-r.top-s/2}px`;
    bubble.appendChild(rip);
    rip.addEventListener('animationend',()=>rip.remove());

    const isOpen=pbox.classList.contains('visible');
    // close all others in same grid
    document.querySelectorAll('.preview-box.visible').forEach(b=>b.classList.remove('visible'));
    document.querySelectorAll('.bubble.open').forEach(b=>b.classList.remove('open'));
    if(!isOpen){
      pbox.classList.add('visible');
      bubble.classList.add('open');
    }
  });

  // CTA button click → smartlink
  pbox.querySelector('.cta-btn').addEventListener('click',function(e){
    e.stopPropagation();
    window.open(SL(author.id),'_blank','noopener,noreferrer');
  });

  wrap.appendChild(bubble);
  wrap.appendChild(pbox);
  return wrap;
}

/* ════════════════════════════════════════
   BUILD SECTION
════════════════════════════════════════ */
function buildSection(dataset,isBn){
  const frag=document.createDocumentFragment();
  CATS.forEach(cat=>{
    const items=dataset.filter(a=>a.type===cat.key);
    const sec=document.createElement('section');
    sec.className=`cat-sec ${cat.css}`;
    const hdr=document.createElement('div');
    hdr.className='cat-header';
    hdr.innerHTML=`
      <span class="cat-badge">${cat.badge}</span>
      <h3 class="cat-title">${isBn?cat.label:cat.enLabel}</h3>
      <div class="cat-line"></div>`;
    sec.appendChild(hdr);
    const grid=document.createElement('div');
    grid.className='bubble-grid';
    items.forEach(a=>grid.appendChild(buildBubble(a,isBn)));
    sec.appendChild(grid);
    frag.appendChild(sec);
  });
  return frag;
}

/* ════════════════════════════════════════
   RENDER
════════════════════════════════════════ */
function renderApp(){
  const app=document.getElementById('app');

  // BENGALI PART
  const bs=document.createElement('div');
  bs.className='part-sep';
  bs.innerHTML=`<div class="part-sep-line"></div><span class="part-badge bn">বাংলা সাহিত্য</span><div class="part-sep-line"></div>`;
  app.appendChild(bs);
  const bt=document.createElement('h2');
  bt.className='part-title bn-t';
  bt.textContent='বাংলা লেখকদের গল্পের জগৎ';
  app.appendChild(bt);
  const bd=document.createElement('p');
  bd.className='part-desc';
  bd.textContent='১০০ জন বাংলাদেশি লেখক — ৪টি ঘরানায় সাজানো গল্পের প্রিভিউ';
  app.appendChild(bd);
  app.appendChild(buildSection(bnData,true));

  // DIVIDER
  const dv=document.createElement('div');
  dv.style.cssText='height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);margin:64px 0';
  app.appendChild(dv);

  // ENGLISH PART
  const es=document.createElement('div');
  es.className='part-sep';
  es.innerHTML=`<div class="part-sep-line"></div><span class="part-badge en">English Literature</span><div class="part-sep-line"></div>`;
  app.appendChild(es);
  const et=document.createElement('h2');
  et.className='part-title en-t';
  et.textContent='English Authors Story Universe';
  app.appendChild(et);
  const ed=document.createElement('p');
  ed.className='part-desc';
  ed.textContent='100 English authors — story previews across 4 genres';
  app.appendChild(ed);
  app.appendChild(buildSection(enData,false));
}

renderApp();
